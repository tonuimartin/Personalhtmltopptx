<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    /* Self-contained: no CDN. Uses Segoe UI / Calibri (Windows) for offline parity. */
    body {
      margin: 0;
      font-family: "Segoe UI", Calibri, sans-serif;
      background: linear-gradient(135deg, #e0f2fe, #f8fafc);
    }
    .card {
      margin: 40px;
      padding: 24px;
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
      max-width: 900px;
    }
    h1 { color: #0f172a; margin: 0 0 12px; font-family: Calibri, "Segoe UI", sans-serif; }
    p { color: #334155; line-height: 1.6; }
    label { display: flex; align-items: center; gap: 8px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>HtmlToSlidesPro Sample</h1>
    <p>This page is self-contained (no internet required). High-fidelity mode embeds each slide as a Puppeteer screenshot matching this render.</p>
    <label><input type="checkbox" checked /> Enable feature</label>
  </div>
</body
</html>
